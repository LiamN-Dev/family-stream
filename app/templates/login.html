{% extends 'base.html' %}
{% block content %}
<div class="w-full max-w-md glass-card rounded-2xl p-8 transform transition-all duration-300">
    <div class="text-center mb-8">
        <h2 id="form-title" class="text-3xl font-bold text-white tracking-tight">Welcome Back</h2>
        <p id="form-subtitle" class="text-gray-400 mt-2 text-sm">Please log in to your dashboard portal.</p>
    </div>

    <!-- FastAPI Alert System -->
    {% if error %}
      <div class="p-4 mb-4 rounded-lg text-sm bg-red-950/40 text-red-300 border border-red-900/50">
          {{ error }}
      </div>
    {% endif %}
    {% if info %}
      <div class="p-4 mb-4 rounded-lg text-sm bg-indigo-950/40 text-indigo-300 border border-indigo-900/50">
          {{ info }}
      </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-6">
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-300 mb-2">Email Address</label>
            <input type="email" name="email" required class="w-full px-4 py-3 rounded-lg glass-input text-sm" placeholder="you@example.com">
        </div>

        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-300 mb-2">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg glass-input text-sm" placeholder="••••••••">
        </div>

        <input type="hidden" id="action-type" name="action" value="login">

        <button type="submit" id="submit-btn" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-semibold rounded-lg shadow-lg hover:shadow-indigo-500/25 transition-all duration-300 text-sm">
            Sign In
        </button>
    </form>

    <div class="mt-6 text-center">
        <button onclick="toggleMode()" id="toggle-btn" class="text-xs text-indigo-300 hover:text-indigo-200 transition duration-200">
            Need an account? Sign up here
        </button>
    </div>
</div>

<script>
    function toggleMode() {
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const actionType = document.getElementById('action-type');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');

        if (actionType.value === 'login') {
            formTitle.textContent = 'Create Account';
            formSubtitle.textContent = 'Sign up for access to your database environment.';
            actionType.value = 'signup';
            submitBtn.textContent = 'Sign Up';
            toggleBtn.textContent = 'Already have an account? Sign in here';
        } else {
            formTitle.textContent = 'Welcome Back';
            formSubtitle.textContent = 'Please log in to your dashboard portal.';
            actionType.value = 'login';
            submitBtn.textContent = 'Sign In';
            toggleBtn.textContent = 'Need an account? Sign up here';
        }
    }
</script>
{% endblock %}
