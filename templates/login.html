<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Portal | Fairmont Rockies Private Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #0a251c, #07131b 60%, #020609);
            background-attachment: fixed;
            color: #f3f4f6;
            min-height: 100vh;
        }

        h1, h2, h3, .brand-font {
            font-family: 'Playfair Display', serif;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px) saturate(140%);
            -webkit-backdrop-filter: blur(25px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 64px -15px rgba(0, 0, 0, 0.7);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(197, 160, 89, 0.6);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
            outline: none;
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Ambient background colors -->
    <div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-emerald-950/20 rounded-full filter blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[450px] h-[450px] bg-sky-950/20 rounded-full filter blur-[120px] pointer-events-none"></div>

    <div class="max-w-md w-full relative z-10">
        <!-- Brand logo -->
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-amber-600 to-emerald-800 flex items-center justify-center border border-white/10 shadow-xl mx-auto mb-4">
                <i class="fa-solid fa-mountain-sun text-white text-2xl"></i>
            </div>
            <span class="block text-xl tracking-widest text-amber-400 font-bold brand-font uppercase">Fairmont</span>
            <span class="block text-xs uppercase tracking-widest text-slate-400 font-semibold mt-1">Rockies Summit 2026</span>
        </div>

        <!-- Glass login panel -->
        <div class="liquid-glass rounded-3xl p-8 md:p-10">
            <h2 class="text-2xl text-white font-semibold text-center mb-6 brand-font">Verify Credentials</h2>
            
            <form id="loginForm" class="space-y-5">
                <!-- Errors message field -->
                <div id="errorAlert" class="hidden p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center font-semibold"></div>

                <div>
                    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1.5 font-bold">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                            <i class="fa-solid fa-user-shield text-sm"></i>
                        </span>
                        <input type="text" id="username" required class="w-full rounded-xl glass-input py-3 pl-10 pr-4 text-sm font-semibold tracking-wide" placeholder="Enter secure username">
                    </div>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1.5 font-bold">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                            <i class="fa-solid fa-key text-sm"></i>
                        </span>
                        <input type="password" id="password" required class="w-full rounded-xl glass-input py-3 pl-10 pr-4 text-sm font-semibold tracking-wide" placeholder="Enter security passphrase">
                    </div>
                </div>

                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-amber-600 to-amber-500 text-black font-extrabold rounded-xl text-xs uppercase tracking-widest hover:shadow-lg hover:scale-[1.02] transition duration-300">
                    Verify & Connect
                </button>
            </form>
        </div>

        <div class="text-center mt-6">
            <a href="/" class="text-xs text-slate-500 hover:text-amber-400 transition tracking-wider uppercase">
                <i class="fa-solid fa-chevron-left text-[10px] mr-1"></i> Return to Public Gateway
            </a>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorAlert = document.getElementById("errorAlert");

            errorAlert.classList.add("hidden");

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    sessionStorage.setItem("sessionRole", data.role);
                    sessionStorage.setItem("sessionUsername", username);
                    window.location.href = "/";
                } else {
                    errorAlert.innerText = data.error || "Credentials verification mismatch.";
                    errorAlert.classList.remove("hidden");
                }
            } catch (err) {
                errorAlert.innerText = "Fatal connection check verification error.";
                errorAlert.classList.remove("hidden");
            }
        };
    </script>
</body>
</html>
